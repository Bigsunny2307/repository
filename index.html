<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyHigh Airlines</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background: #004080;
      color: white;
      padding: 15px;
      text-align: center;
    }
    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
    }
    .hero {
      background: lightblue;
      text-align: center;
      padding: 80px 20px;
    }
    .hero h1 {
      font-size: 2.5em;
      margin: 0;
    }
    .booking {
      padding: 40px;
      text-align: center;
    }
    .booking input, .booking button {
      padding: 10px;
      margin: 10px;
      width: 200px;
    }
    footer {
      background: #004080;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h2>SkyHigh Airlines</h2>
    <nav>
      <a href="#">Home</a>
      <a href="#">Flights</a>
      <a href="#">Destinations</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Fly With Comfort</h1>
    <p>Book your next adventure with SkyHigh Airlines</p>
  </section>

  <section class="booking">
    <h2>Book Your Flight</h2>
    <form>
      <input type="text" placeholder="From">
      <input type="text" placeholder="To">
      <input type="date">
      <input type="date">
      <button type="submit">Search Flights</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2026 SkyHigh Airlines. All rights reserved.</p>
  </footer>
</body>
</html>
